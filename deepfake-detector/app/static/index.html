<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obscuro Deepimage</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:#0d0d0d;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Navbar ───────────────────────────────────────────────────────────── */
.navbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;
  z-index:100;
}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;}
.nav-logo{width:32px;height:32px;flex-shrink:0;}
.nav-name{color:#fff;font-size:15px;font-weight:500;letter-spacing:0.02em;}
.nav-hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.nav-hamburger span{display:block;width:22px;height:2.5px;background:#888;border-radius:1px;}

/* ── Upload screen ────────────────────────────────────────────────────── */
#screen-upload{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:80px 20px 40px;
}
.page-title{
  font-family:Georgia,"Times New Roman",Times,serif;
  font-size:58px;font-weight:400;color:#7d7d7d;
  letter-spacing:0.01em;margin-bottom:36px;text-align:center;
}
.upload-card{
  background:#282828;border-radius:20px;
  padding:28px 36px 24px;width:318px;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:background 0.15s;
  user-select:none;
}
.upload-card.dragover{background:#333;}
.drag-label{
  font-family:Georgia,"Times New Roman",serif;
  font-size:30px;font-weight:400;color:#fff;margin-bottom:14px;
}
.cursor-img{
  width:92px;height:92px;object-fit:contain;
  image-rendering:pixelated;image-rendering:crisp-edges;
  margin-bottom:20px;display:block;
}
.upload-btn{
  width:100%;padding:9px 0;
  background:#1c1c1c;color:#aaa;
  border:none;border-radius:8px;
  font-size:13px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  cursor:pointer;transition:background 0.15s,color 0.15s;
}
.upload-btn:hover{background:#252525;color:#ccc;}
#file-input{display:none;}

/* ── Loading screen ───────────────────────────────────────────────────── */
#screen-loading{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:20px;
}
.spinner{
  width:44px;height:44px;
  border:3px solid #2a2a2a;border-top-color:#7d7d7d;
  border-radius:50%;animation:spin 0.75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:Georgia,serif;font-size:18px;color:#7d7d7d;}
.loading-sub{font-size:12px;color:#444;font-family:-apple-system,sans-serif;}

/* ── Results screen ───────────────────────────────────────────────────── */
#screen-results{
  display:none;flex-direction:column;min-height:100vh;
}
.results-header{
  padding:18px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:#0d0d0d;z-index:50;
}
.results-body{max-width:820px;margin:0 auto;padding:8px 28px 60px;width:100%;}

.back-btn{
  background:#282828;color:#aaa;border:none;border-radius:8px;
  padding:7px 16px;font-size:12px;cursor:pointer;
  font-family:-apple-system,sans-serif;transition:background 0.15s;
  display:flex;align-items:center;gap:6px;
}
.back-btn:hover{background:#333;color:#ddd;}

/* Verdict card */
.verdict-card{
  background:#282828;border-radius:16px;padding:32px 28px;
  margin-bottom:16px;text-align:center;
}
.verdict-label{
  font-family:Georgia,serif;font-size:40px;font-weight:400;margin-bottom:8px;
}
.v-fake{color:#f87171;} .v-real{color:#6ee7b7;} .v-uncertain{color:#fbbf24;}
.verdict-meta{color:#888;font-size:14px;line-height:1.8;}
.verdict-meta b{color:#ccc;}
.prob-track{margin:18px 0 4px;background:#1c1c1c;border-radius:6px;height:6px;overflow:hidden;}
.prob-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.prob-legend{font-size:11px;color:#555;text-align:right;}

/* Preview */
.preview-wrap{
  display:flex;gap:20px;align-items:flex-start;
  background:#282828;border-radius:16px;padding:20px 24px;margin-bottom:16px;
}
.preview-img{
  width:140px;height:140px;border-radius:10px;object-fit:cover;
  background:#1c1c1c;flex-shrink:0;
}
.preview-meta{padding-top:4px;}
.preview-meta p{font-size:13px;color:#888;line-height:1.9;}
.preview-meta b{color:#bbb;}

/* Section cards */
.section-card{
  background:#282828;border-radius:16px;padding:24px;margin-bottom:16px;
}
.section-title{
  font-family:Georgia,serif;font-size:17px;color:#888;margin-bottom:16px;font-weight:400;
}

/* Agent rows */
.agent-row{
  display:flex;align-items:center;gap:12px;
  padding:9px 0;border-bottom:1px solid #1e1e1e;
}
.agent-row:last-child{border-bottom:none;}
.agent-name{flex:1;font-size:13px;color:#999;}
.agent-bar-wrap{width:110px;height:4px;background:#1c1c1c;border-radius:2px;overflow:hidden;}
.agent-bar-fill{height:100%;border-radius:2px;}
.agent-score-val{font-size:12px;color:#666;width:42px;text-align:right;}
.agent-skipped{opacity:0.38;font-style:italic;}

/* Rationale */
.rationale-text{font-size:14px;color:#888;line-height:1.8;}

/* Actions */
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.action-btn{
  background:#1c1c1c;color:#888;border:1px solid #2a2a2a;
  border-radius:8px;padding:8px 18px;font-size:12px;
  cursor:pointer;font-family:-apple-system,sans-serif;transition:all 0.15s;
}
.action-btn:hover{background:#232323;color:#bbb;border-color:#333;}

/* Disclaimer */
.disclaimer{
  background:#1a1610;border-left:3px solid #6b4a10;
  border-radius:8px;padding:13px 16px;
  font-size:12px;color:#777;line-height:1.7;margin-top:6px;
}

/* Error */
.error-card{
  background:#280d0d;border:1px solid #4a1515;
  border-radius:16px;padding:24px;text-align:center;color:#f87171;
  font-family:Georgia,serif;font-size:18px;
}
</style>
</head>

<script>
/* ── Screen management ─────────────────────────────────────────────────── */
const screens = {
  upload:  document.getElementById("screen-upload"),
  loading: document.getElementById("screen-loading"),
  results: document.getElementById("screen-results"),
};
function show(name) {
  Object.values(screens).forEach(s => s.style.display = "none");
  screens[name].style.display = "flex";
  screens[name].style.flexDirection = "column";
}
show("upload");

function goUpload() {
  show("upload");
  document.getElementById("file-input").value = "";
}

/* ── Drag & drop wiring ────────────────────────────────────────────────── */
const card = document.getElementById("upload-card");
const fileInput = document.getElementById("file-input");
const uploadBtn = document.getElementById("upload-btn");

uploadBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  fileInput.click();
});
card.addEventListener("click", () => fileInput.click());

card.addEventListener("dragover", (e) => {
  e.preventDefault();
  card.classList.add("dragover");
});
card.addEventListener("dragleave", () => card.classList.remove("dragover"));
card.addEventListener("drop", (e) => {
  e.preventDefault();
  card.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
fileInput.addEventListener("change", (e) => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

/* Also allow full-page drop */
document.body.addEventListener("dragover", (e) => e.preventDefault());
document.body.addEventListener("drop", (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

/* ── File processing ───────────────────────────────────────────────────── */
let lastResult = null;
let lastFilename = "";
let lastFileBytes = null;

async function processFile(file) {
  lastFilename = file.name;
  document.getElementById("loading-fname").textContent = file.name;
  show("loading");

  const fd = new FormData();
  fd.append("file", file, file.name);

  try {
    const resp = await fetch("/api/analyse", { method: "POST", body: fd });
    if (!resp.ok) {
      const txt = await resp.text();
      showError("API error " + resp.status + ": " + txt.slice(0, 300));
      return;
    }
    const data = await resp.json();
    lastResult = data;
    // Stash preview bytes
    const reader = new FileReader();
    reader.onload = (ev) => { lastFileBytes = ev.target.result; renderResults(data, file); };
    reader.readAsDataURL(file);
  } catch (err) {
    showError("Connection error: " + err.message);
  }
}

function showError(msg) {
  document.getElementById("results-body").innerHTML =
    `<div class="error-card">${msg}<br><br>
     <button class="action-btn" onclick="goUpload()">Try again</button></div>`;
  show("results");
}

/* ── Results rendering ─────────────────────────────────────────────────── */
function scoreColor(s) {
  if (s > 0.58) return "#f87171";
  if (s < 0.42) return "#6ee7b7";
  return "#fbbf24";
}

function renderResults(r, file) {
  const verdict  = r.verdict || "UNCERTAIN";
  const prob     = r.deepfake_probability ?? 0.5;
  const conf     = r.confidence_in_verdict ?? 0;
  const media    = r.media_type || "image";
  const procTime = r.processing_time_s?.toFixed(2) ?? "—";
  const rationale = r.rationale || "No rationale available.";
  const agents   = r.agent_results || [];
  const weights  = r.fusion_weights || {};

  const verdictClass = verdict === "LIKELY FAKE" ? "v-fake"
                     : verdict === "LIKELY REAL"  ? "v-real"
                     : "v-uncertain";

  const isImage = /\.(jpe?g|png|webp|bmp)$/i.test(file.name);
  const previewEl = isImage
    ? `<img class="preview-img" src="${lastFileBytes}" alt="${file.name}">`
    : `<div class="preview-img" style="display:flex;align-items:center;justify-content:center;color:#555;font-size:12px;">video</div>`;

  const agentRows = agents.map(a => {
    const name  = a.agent_name || "Agent";
    const ran   = a.ran !== false;
    const score = a.score ?? 0.5;
    const pct   = (score * 100).toFixed(1);
    const color = scoreColor(score);
    if (!ran) {
      return `<div class="agent-row agent-skipped">
                <span class="agent-name">${name}</span>
                <span class="agent-score-val" style="color:#444">skipped</span>
              </div>`;
    }
    return `<div class="agent-row">
              <span class="agent-name">${name}</span>
              <div class="agent-bar-wrap">
                <div class="agent-bar-fill" style="width:${score*100}%;background:${color}"></div>
              </div>
              <span class="agent-score-val">${pct}%</span>
            </div>`;
  }).join("");

  const weightRows = Object.entries(weights).map(([k, w]) => {
    const label = k.replace(/_score$/, "").replace(/_/g, " ")
                   .replace(/\w/g, c => c.toUpperCase());
    const color = scoreColor(w);
    return `<div class="agent-row">
              <span class="agent-name">${label}</span>
              <div class="agent-bar-wrap">
                <div class="agent-bar-fill" style="width:${w*100}%;background:#7d7d7d"></div>
              </div>
              <span class="agent-score-val">${(w*100).toFixed(0)}%</span>
            </div>`;
  }).join("");

  const warnings = (r.warnings || []).map(w =>
    `<div style="background:#1e1a10;border-left:3px solid #78541e;border-radius:6px;padding:9px 14px;font-size:12px;color:#aaa;margin-bottom:8px;">${w}</div>`
  ).join("");

  document.getElementById("results-body").innerHTML = `
    <!-- Preview -->
    <div class="preview-wrap">
      ${previewEl}
      <div class="preview-meta">
        <p><b>File</b> ${file.name}</p>
        <p><b>Size</b> ${(file.size/1024/1024).toFixed(2)} MB</p>
        <p><b>Type</b> ${media}</p>
        <p><b>Time</b> ${procTime}s</p>
      </div>
    </div>

    <!-- Verdict -->
    <div class="verdict-card">
      <div class="verdict-label ${verdictClass}">${verdict}</div>
      <div class="verdict-meta">
        Deepfake probability: <b>${(prob*100).toFixed(1)}%</b> &nbsp;·&nbsp;
        Verdict confidence: <b>${(conf*100).toFixed(0)}%</b>
      </div>
      ${warnings}
      <div class="prob-track">
        <div class="prob-fill" style="width:${prob*100}%;background:${scoreColor(prob)}"></div>
      </div>
      <div class="prob-legend">${(prob*100).toFixed(1)}% deepfake probability</div>
    </div>

    <!-- Agent breakdown -->
    <div class="section-card">
      <div class="section-title">Agent Signal Breakdown</div>
      ${agentRows || '<div style="color:#555;font-size:13px;">No agent data.</div>'}
    </div>

    <!-- Fusion weights -->
    <div class="section-card">
      <div class="section-title">Fusion Weights</div>
      <div style="font-size:11px;color:#555;margin-bottom:14px;">
        Quantum-inspired calibration (PennyLane — classical simulation only, no quantum hardware claimed)
      </div>
      ${weightRows || '<div style="color:#555;font-size:13px;">No weight data.</div>'}
    </div>

    <!-- Rationale -->
    <div class="section-card">
      <div class="section-title">Forensic Rationale</div>
      <div class="rationale-text">${rationale.replace(/
/g, '<br>')}</div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="action-btn" onclick="downloadReport()">Download Report (JSON)</button>
      <button class="action-btn" onclick="goUpload()">Analyse Another</button>
    </div>

    <div class="disclaimer">
      <b>Important:</b> Deepfake detection is probabilistic. This tool is for forensic research
      only and is not legally admissible evidence. False positives and negatives occur.
    </div>
  `;
  show("results");
}

function downloadReport() {
  if (!lastResult) return;
  const blob = new Blob([JSON.stringify(lastResult, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "obscuro_report_" + lastFilename + ".json";
  a.click();
}
</script>
</body>
</html>
