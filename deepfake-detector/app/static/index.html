<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obscuro Deepimage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: #0f0f0f;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Tiempos Headline => Playfair Display */
.serif {
  font-family: "Tiempos Headline", "Playfair Display", Georgia, serif;
}

/* ── Navbar ─────────────────────────────────────────────── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 36px; z-index: 100;
}
.nav-brand {
  display: flex; align-items: center; gap: 14px;
  pointer-events: none; user-select: none;
}
.nav-logo {
  width: 38px; height: 38px; object-fit: contain;
  image-rendering: pixelated; image-rendering: crisp-edges; flex-shrink: 0;
}
.nav-wordmark {
  height: 24px; object-fit: contain;
  image-rendering: pixelated; image-rendering: crisp-edges;
}
.nav-hamburger {
  display: flex; flex-direction: column; gap: 5px;
  cursor: pointer; padding: 6px;
}
.nav-hamburger span {
  display: block; width: 20px; height: 2px;
  background: #444; border-radius: 1px; transition: background 0.15s;
}
.nav-hamburger:hover span { background: #666; }

/* ── Upload screen ───────────────────────────────────────── */
#screen-upload {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 100px 20px 40px;
}
.page-title {
  font-family: "Tiempos Headline", "Playfair Display", Georgia, serif;
  font-size: 54px; font-weight: 400; color: #555;
  letter-spacing: -0.01em; margin-bottom: 44px; text-align: center;
  pointer-events: none; user-select: none;
}
.upload-card {
  background: #191919; border-radius: 20px;
  padding: 34px 44px 28px; width: 360px;
  display: flex; flex-direction: column; align-items: center;
  transition: background 0.15s; cursor: pointer;
}
.upload-card:hover { background: #1d1d1d; }
.upload-card.dragover { background: #222; }
.drag-label {
  font-family: "Tiempos Headline", "Playfair Display", Georgia, serif;
  font-size: 28px; font-weight: 400; color: #d8d8d8;
  margin-bottom: 24px; pointer-events: none; user-select: none;
}
.cursor-img {
  width: 120px; object-fit: contain;
  image-rendering: pixelated; image-rendering: crisp-edges;
  margin-bottom: 28px; display: block;
  pointer-events: none; user-select: none; flex-shrink: 0;
}
.upload-btn {
  width: 100%; padding: 11px 0;
  background: #242424; color: #666;
  border: none; border-radius: 9px;
  font-size: 13px; letter-spacing: 0.04em;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  cursor: pointer; transition: background 0.12s, color 0.12s;
}
.upload-btn:hover { background: #2c2c2c; color: #999; }
#file-input { display: none; }

/* ── Pixel noise loading screen ─────────────────────────── */
#screen-loading {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
}
.noise-wrap {
  position: relative; width: 360px; height: 360px;
  border-radius: 18px; overflow: hidden;
  flex-shrink: 0;
}
#noise-canvas {
  display: block; width: 100%; height: 100%;
  image-rendering: pixelated; image-rendering: crisp-edges;
}
/* Scanline overlay */
.noise-wrap::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
}
.noise-label {
  margin-top: 24px;
  font-family: "Tiempos Headline", "Playfair Display", Georgia, serif;
  font-size: 15px; font-weight: 400;
  color: #3a3a3a; letter-spacing: 0.12em;
  text-transform: uppercase;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1; }
}
.noise-fname {
  margin-top: 8px;
  font-size: 11px; color: #2a2a2a;
  letter-spacing: 0.04em;
  max-width: 340px; text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Results screen ──────────────────────────────────────── */
#screen-results { display: none; flex-direction: column; min-height: 100vh; }
.results-header {
  padding: 20px 36px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: #0f0f0f; z-index: 50;
}
.results-body {
  max-width: 760px; margin: 0 auto;
  padding: 8px 28px 60px; width: 100%;
}
.back-btn {
  background: #191919; color: #555; border: none;
  border-radius: 8px; padding: 7px 16px; font-size: 12px;
  cursor: pointer; transition: all 0.12s; letter-spacing: 0.02em;
}
.back-btn:hover { background: #222; color: #888; }

/* Cards */
.card { background: #191919; border-radius: 14px; padding: 24px; margin-bottom: 10px; }
.card-center { text-align: center; }
.section-label {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: #3a3a3a; margin-bottom: 16px; font-weight: 500;
}
.verdict-label {
  font-family: "Tiempos Headline", "Playfair Display", Georgia, serif;
  font-size: 34px; font-weight: 400; margin-bottom: 8px;
}
.v-fake { color: #c45050; } .v-real { color: #4a9060; } .v-uncertain { color: #9a7830; }
.verdict-meta { color: #444; font-size: 13px; line-height: 1.9; }
.verdict-meta b { color: #666; }
.prob-track {
  margin: 14px auto 4px; max-width: 280px;
  background: #222; border-radius: 3px; height: 3px; overflow: hidden;
}
.prob-fill { height: 100%; border-radius: 3px; transition: width .9s cubic-bezier(.4,0,.2,1); }
.prob-legend { font-size: 10px; color: #2e2e2e; text-align: center; letter-spacing: 0.04em; }
.preview-wrap { display: flex; gap: 18px; align-items: flex-start; }
.preview-img {
  width: 120px; height: 120px; border-radius: 8px;
  object-fit: cover; background: #222; flex-shrink: 0;
}
.preview-meta p { font-size: 12px; color: #444; line-height: 2; }
.preview-meta b { color: #666; }
.agent-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid #181818;
}
.agent-row:last-child { border-bottom: none; }
.agent-name { flex: 1; font-size: 12px; color: #555; }
.bar-wrap { width: 90px; height: 2px; background: #222; border-radius: 1px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 1px; }
.score-val { font-size: 11px; color: #383838; width: 36px; text-align: right; }
.rationale-text { font-size: 13px; color: #484848; line-height: 1.9; }
.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.action-btn {
  background: #191919; color: #484848; border: 1px solid #222;
  border-radius: 8px; padding: 8px 18px; font-size: 11px; cursor: pointer;
  letter-spacing: 0.03em; transition: all 0.12s;
}
.action-btn:hover { background: #1e1e1e; color: #777; border-color: #2a2a2a; }
.disclaimer {
  margin-top: 8px; padding: 11px 16px;
  background: #151310; border-left: 2px solid #3a2c10;
  border-radius: 6px; font-size: 11px; color: #3e3830; line-height: 1.7;
}
.error-card {
  background: #160e0e; border: 1px solid #2e1010;
  border-radius: 14px; padding: 24px; text-align: center;
  color: #c45050; font-family: "Tiempos Headline", "Playfair Display", Georgia, serif;
  font-size: 17px;
}
</style>
</head>

    </div>
    <button class="back-btn" onclick="goUpload()">← Analyse another</button>
  </div>
  <div class="results-body" id="results-body"></div>
</div>

<script>
/* ── Screen management ─────────────────────────────────── */
const screens = {
  upload:  document.getElementById("screen-upload"),
  loading: document.getElementById("screen-loading"),
  results: document.getElementById("screen-results"),
};
function show(n) {
  Object.values(screens).forEach(s => s.style.display = "none");
  screens[n].style.display = "flex";
  screens[n].style.flexDirection = "column";
}
show("upload");
function goUpload() {
  stopNoise();
  show("upload");
  document.getElementById("file-input").value = "";
}

/* ── Drag & drop ───────────────────────────────────────── */
const card      = document.getElementById("upload-card");
const fileInput = document.getElementById("file-input");
const uploadBtn = document.getElementById("upload-btn");

uploadBtn.addEventListener("click", e => { e.stopPropagation(); fileInput.click(); });
card.addEventListener("click", () => fileInput.click());
card.addEventListener("dragover",  e => { e.preventDefault(); card.classList.add("dragover"); });
card.addEventListener("dragleave", () => card.classList.remove("dragover"));
card.addEventListener("drop", e => {
  e.preventDefault(); card.classList.remove("dragover");
  const f = e.dataTransfer.files[0];
  if (f && /\.(jpe?g|png|webp|bmp)$/i.test(f.name)) processFile(f);
  else if (f) showError("Please drop an image file (JPG, PNG, WebP, BMP).");
});
document.body.addEventListener("dragover", e => e.preventDefault());
document.body.addEventListener("drop", e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && /\.(jpe?g|png|webp|bmp)$/i.test(f.name)) processFile(f);
});
fileInput.addEventListener("change", e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

/* ── Pixel noise engine ────────────────────────────────── */
let noiseRaf = null;
const canvas = document.getElementById("noise-canvas");
const ctx    = canvas.getContext("2d");

// Pixel grid dimensions — low-res for chunky pixel look
const GRID_W = 45;
const GRID_H = 45;
// Internal canvas resolution
canvas.width  = GRID_W;
canvas.height = GRID_H;

let basePixels = null; // Uint8Array RGBA of the pixelated base image

function buildBasePixels(dataUrl, cb) {
  const img = new Image();
  img.onload = () => {
    // Draw source image into GRID_W x GRID_H offscreen canvas
    const off = document.createElement("canvas");
    off.width  = GRID_W;
    off.height = GRID_H;
    const oc = off.getContext("2d");
    oc.imageSmoothingEnabled = true;
    oc.imageSmoothingQuality = "low";
    oc.drawImage(img, 0, 0, GRID_W, GRID_H);
    basePixels = oc.getImageData(0, 0, GRID_W, GRID_H).data.slice(); // copy
    cb();
  };
  img.src = dataUrl;
}

function animateNoise() {
  if (!basePixels) return;

  const imageData = ctx.createImageData(GRID_W, GRID_H);
  const d = imageData.data;

  for (let i = 0; i < basePixels.length; i += 4) {
    // Random noise intensity per pixel
    const noisy = Math.random() > 0.55;
    const scatter = Math.random() > 0.92; // occasional hard scatter

    if (scatter) {
      // Random bright or dark scatter pixel
      const v = Math.random() > 0.5 ? 255 : 0;
      d[i]   = v;
      d[i+1] = v;
      d[i+2] = v;
      d[i+3] = Math.floor(120 + Math.random() * 135);
    } else if (noisy) {
      const shift = (Math.random() - 0.5) * 110;
      d[i]   = Math.min(255, Math.max(0, basePixels[i]   + shift));
      d[i+1] = Math.min(255, Math.max(0, basePixels[i+1] + shift * 0.8));
      d[i+2] = Math.min(255, Math.max(0, basePixels[i+2] + shift * 1.2));
      d[i+3] = basePixels[i+3];
    } else {
      d[i]   = basePixels[i];
      d[i+1] = basePixels[i+1];
      d[i+2] = basePixels[i+2];
      d[i+3] = basePixels[i+3];
    }
  }

  ctx.putImageData(imageData, 0, 0);
  noiseRaf = requestAnimationFrame(animateNoise);
}

function startNoise(dataUrl) {
  stopNoise();
  ctx.fillStyle = "#191919";
  ctx.fillRect(0, 0, GRID_W, GRID_H);
  buildBasePixels(dataUrl, () => { animateNoise(); });
}

function stopNoise() {
  if (noiseRaf) { cancelAnimationFrame(noiseRaf); noiseRaf = null; }
  basePixels = null;
}

/* ── File processing ───────────────────────────────────── */
let lastResult = null, lastFilename = "", lastFileBytes = null;

async function processFile(file) {
  lastFilename = file.name;
  document.getElementById("loading-fname").textContent = file.name;

  // Read image → show pixel noise loading first
  const reader = new FileReader();
  reader.onload = async ev => {
    lastFileBytes = ev.target.result;

    // Switch to loading screen and start noise
    show("loading");
    startNoise(lastFileBytes);

    // Fire API request
    const fd = new FormData();
    fd.append("file", file, file.name);
    try {
      const resp = await fetch("/api/analyse", { method: "POST", body: fd });
      if (!resp.ok) { showError("API error " + resp.status + ": " + (await resp.text()).slice(0,300)); return; }
      const data = await resp.json();
      lastResult = data;
      stopNoise();
      renderResults(data, file);
    } catch(err) {
      showError("Connection error: " + err.message);
    }
  };
  reader.readAsDataURL(file);
}

function showError(msg) {
  stopNoise();
  document.getElementById("results-body").innerHTML =
    `<div class="error-card">${msg}<br><br><button class="action-btn" onclick="goUpload()">Try again</button></div>`;
  show("results");
}

/* ── Score color ───────────────────────────────────────── */
function sc(s) {
  return s > 0.58 ? "#c45050" : s < 0.42 ? "#4a9060" : "#9a7830";
}

/* ── Results rendering ─────────────────────────────────── */
function renderResults(r, file) {
  const verdict   = r.verdict || "UNCERTAIN";
  const prob      = r.deepfake_probability ?? 0.5;
  const conf      = r.confidence_in_verdict ?? 0;
  const media     = r.media_type || "image";
  const procTime  = r.processing_time_s?.toFixed(2) ?? "—";
  const rationale = r.rationale || "";
  const agents    = r.agent_results || [];
  const weights   = r.fusion_weights || {};
  const vClass    = verdict === "LIKELY FAKE" ? "v-fake" : verdict === "LIKELY REAL" ? "v-real" : "v-uncertain";

  const prevEl = `<img class="preview-img" src="${lastFileBytes}" alt="">`;

  const agentRows = agents.map(a => {
    if (!a.ran) return `<div class="agent-row"><span class="agent-name" style="opacity:.25;font-style:italic">${a.agent_name||"Agent"} — skipped</span></div>`;
    const s = a.score ?? 0.5;
    return `<div class="agent-row">
      <span class="agent-name">${a.agent_name||"Agent"}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${s*100}%;background:${sc(s)}"></div></div>
      <span class="score-val">${(s*100).toFixed(1)}%</span>
    </div>`;
  }).join("");

  const wRows = Object.entries(weights).map(([k,w]) => {
    const lbl = k.replace(/_score$/,"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
    return `<div class="agent-row">
      <span class="agent-name">${lbl}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${w*100}%;background:#2e2e2e"></div></div>
      <span class="score-val">${(w*100).toFixed(0)}%</span>
    </div>`;
  }).join("");

  const warns = (r.warnings||[]).map(w =>
    `<div style="background:#161410;border-left:2px solid #4a3010;border-radius:4px;padding:7px 12px;font-size:11px;color:#5a4a28;margin-bottom:6px;">${w}</div>`
  ).join("");

  document.getElementById("results-body").innerHTML = `
    <div class="card">
      <div class="preview-wrap">
        ${prevEl}
        <div class="preview-meta" style="padding-top:2px;">
          <p><b>File</b>&nbsp; ${file.name}</p>
          <p><b>Size</b>&nbsp; ${(file.size/1024/1024).toFixed(2)} MB</p>
          <p><b>Type</b>&nbsp; ${media}</p>
          <p><b>Time</b>&nbsp; ${procTime}s</p>
        </div>
      </div>
    </div>
    <div class="card card-center">
      <div class="verdict-label ${vClass}">${verdict}</div>
      <div class="verdict-meta">
        Deepfake probability&nbsp;<b>${(prob*100).toFixed(1)}%</b>&ensp;·&ensp;Confidence&nbsp;<b>${(conf*100).toFixed(0)}%</b>
      </div>
      ${warns}
      <div class="prob-track"><div class="prob-fill" style="width:${prob*100}%;background:${sc(prob)}"></div></div>
      <div class="prob-legend">${(prob*100).toFixed(1)}% deepfake probability</div>
    </div>
    ${agents.length ? `
    <div class="card">
      <div class="section-label">Agent Signals</div>
      ${agentRows}
    </div>
    <div class="card">
      <div class="section-label">Fusion Weights</div>
      ${wRows || '<span style="color:#2e2e2e;font-size:12px;">—</span>'}
    </div>` : ""}
    ${rationale ? `<div class="card">
      <div class="section-label">Forensic Rationale</div>
      <div class="rationale-text">${rationale.replace(/\n/g,"<br>")}</div>
    </div>` : ""}
    <div class="action-row">
      <button class="action-btn" onclick="downloadReport()">Download Report (JSON)</button>
      <button class="action-btn" onclick="goUpload()">Analyse Another</button>
    </div>
    <div class="disclaimer">
      Deepfake detection is probabilistic — not legally admissible evidence. For forensic research only.
    </div>`;
  show("results");
}

function downloadReport() {
  if (!lastResult) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(lastResult,null,2)],{type:"application/json"}));
  a.download = "obscuro_report_" + lastFilename + ".json";
  a.click();
}
</script>
</body>
</html>
